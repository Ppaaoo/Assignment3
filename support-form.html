<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="utf-8">
        <title>Skicka in supportformulär</title>
        <link rel="StyleSheet" type="text/css" href="support-form.css">
    </head>
    <body>
        <form>
            <h1>Supportformulär</h1>
            <!-- Sätt in en linje (divider) -->
            <p>Här kan du skicka in ett ärende till vår supportavdelning.</p>
            <div>
                <label for="name">Ditt namn:</label>
                <input type="text" id="name">
            </div>
            <div>
                <label for="phone">Telefon:</label>
                <input type="text" id="phone">
            </div>
            <div>
            <label for="priority">Prioritet:</label>
            <select name="priority" id="priority" required>
                <option value="1" selected="selected">Låg</option>
                <option value="2">Medel</option>
                <option value="3">Hög</option>
                <option value="4">Akut</option>
            </select>
            </div>
            <div>
                <p>Tilldela till ort:</p>
                    <input type="radio" name="region" id="gbg" value="1" checked="checked" class="radio-button">
                <label for="gbg">Göteborg</label>
                    <input type="radio" name="region" id="sthlm" value="2" class="radio-button">
                <label for="sthlm">Stockholm</label>
                    <input type="radio" name="region" id="ume" value="3" class="radio-button">
                <label for="ume">Umeå</label>
                    <input type="radio" name="region" id="lule" value="4" class="radio-button">
                <label for="lule">Luleå</label>
            </div>
            <div>
                <label for="category">Kategori:</label>
                <select name="category" id="category" required>
                    <option value="1" selected="selected">Fakturering</option>
                    <option value="2">Hårdvara</option>
                    <option value="3">Mjukvara</option>
                    <option value="4">Inloggning</option>
                    <option value="5">Nätverk</option>
                    <option value="6">Ström</option>
                    <option value="7">Övrigt</option>
                </select>
            </div>
            <div>
                <label for="title">Rubrik:</label>
                <input type="text" id="title">
            </div>
            <div>
                <label for="description">Beskrivning:</label>
                <textarea id="description"></textarea>
            </div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </form>
    </body>
</html>
